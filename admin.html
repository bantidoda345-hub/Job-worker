<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Banti Jobs</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="adminLoginModal" class="modal active">
        <div class="modal-content">
            <div class="login-form">
                <h2><i class="fas fa-user-shield"></i> Admin Login</h2>
                <form id="adminLoginForm">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="adminUser" placeholder="BANTIBOSS00" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="adminPass" placeholder="BANTI200772003" required>
                    </div>
                    <button type="submit" class="btn btn-primary full-width">Login</button>
                </form>
            </div>
        </div>
    </div>

    <div id="adminDashboard" class="admin-dashboard hidden">
        <header class="admin-header">
            <h1><i class="fas fa-tachometer-alt"></i> Admin Dashboard</h1>
            <button id="logoutBtn" class="btn btn-danger">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </header>

        <div class="admin-container">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3 id="totalWorkers">0</h3>
                    <p>Total Workers</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalJobs">0</h3>
                    <p>Total Jobs</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalRevenue">₹0</h3>
                    <p>Total Revenue</p>
                </div>
                <div class="stat-card">
                    <h3 id="pendingApps">0</h3>
                    <p>Pending Apps</p>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="workers">Workers</button>
                <button class="tab-btn" data-tab="jobs">Jobs</button>
            </div>

            <div id="workersTab" class="tab-content active">
                <h3>Pending Workers <span id="pendingWorkersCount">(0)</span></h3>
                <div id="pendingWorkersList" class="list-container"></div>
                <h3>Approved Workers</h3>
                <div id="approvedWorkersList" class="list-container"></div>
            </div>

            <div id="jobsTab" class="tab-content">
                <h3>Pending Jobs <span id="pendingJobsCount">(0)</span></h3>
                <div id="pendingJobsList" class="list-container"></div>
                <h3>Approved Jobs</h3>
                <div id="approvedJobsList" class="list-container"></div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
